name: coding_agent_fix_v1
version: 1.0.0
description: Contract for autonomous coding agents, require verification before merge
domain: code
intent: Ensure coding agents verify fixes (tests, repro) before proposing merge
author: ''
created_at: '2026-07-09T11:28:02.179486'
depth:
  min: 4
  max: 30
  severity: block
  rationale: Bug fixes require interpreting the failure, proposing a change, and checking
    the result. One-liner patches skip that reasoning depth.
steps:
  min: 3
  severity: block
  rationale: 'Expected flow: reproduce/locate bug, apply fix, run tests or checks.'
verification:
  required: true
  min_steps: 1
  severity: block
  rationale: Coding agents MUST run tests or equivalent checks before merge. Skipping
    verification is how plausible-looking diffs ship regressions.
uncertainty:
  max_hedging_ratio: 0.25
  severity: warn
  rationale: After running checks, agents should state confidence clearly.
output:
  min_length: 120
  require_structured: false
  severity: fail
  rationale: A merge-ready agent response should document what was verified.
forbidden_patterns:
- pattern: ship it|LGTM|merge as-is|skip tests|tests can wait
  description: Must not bypass verification or rubber-stamp merge
  check_output: true
  check_reasoning: true
  severity: block
  rationale: Auto-merge pipelines fail when agents skip checks.
required_patterns:
- pattern: test|pytest|verify|repro|assert
  description: Must reference verification activity
  check_output: true
  check_reasoning: false
  severity: fail
  rationale: Merge proposals without evidence of verification are unsafe.
block_on_violation: true
